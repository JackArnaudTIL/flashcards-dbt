<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- Screen 1: Deck picker -->
  <div id="deckPicker">
    <h1>Choose a deck</h1>
    <div class="deck-grid" id="deckGrid"></div>
  </div>

  <!-- Screen 2: Certification picker (only shown if certifications exist) -->
  <div id="certPicker" style="display:none">
    <div class="topbar">
      <button class="back-btn" onclick="showPicker()">← Decks</button>
      <span id="certDeckTitle"></span>
    </div>
    <h2 class="screen-heading">Choose a certification</h2>
    <div class="cert-grid" id="certGrid"></div>
  </div>

  <!-- Screen 3: Filter picker -->
  <div id="filterPicker" style="display:none">
    <div class="topbar">
      <button class="back-btn" id="filterBackBtn" onclick="filterBack()">← Back</button>
      <span id="filterDeckTitle"></span>
    </div>
    <div class="filter-section" id="categorySection">
      <div class="filter-heading">Category</div>
      <div class="filter-chips" id="categoryChips"></div>
    </div>
    <div class="filter-section" id="groupSection">
      <div class="filter-heading">Group</div>
      <div class="filter-chips" id="groupChips"></div>
    </div>
    <div class="filter-section">
      <div class="filter-heading">Difficulty</div>
      <div class="filter-chips" id="difficultyChips"></div>
    </div>
    <div class="filter-footer">
      <span id="filterCount" class="filter-count"></span>
      <button class="start-btn" id="startBtn" onclick="startFiltered()">Start</button>
    </div>
  </div>

  <!-- Screen 4: Study view -->
  <div id="studyView" style="display:none">
    <div class="topbar">
      <button class="back-btn" onclick="showFilterPicker()">← Filters</button>
      <span id="deckCount"></span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
      <span class="progress-label" id="pLabel">0 / 0</span>
    </div>
    <div id="cardArea">
      <div class="scene" onclick="flip()">
        <div class="card-inner" id="cardInner">
          <div class="card-face front">
            <div class="card-meta" id="cardMeta"></div>
            <div class="card-label">question</div>
            <div class="card-text" id="frontText"></div>
          </div>
          <div class="card-face back">
            <div class="card-meta"></div>
            <div class="card-label">answer</div>
            <div class="card-text" id="backText"></div>
          </div>
        </div>
      </div>

      <div class="card-actions">
        <button class="thumb-btn" id="thumbUp"   onclick="thumb('up')"   title="Good card">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
        </button>
        <button class="thumb-btn" id="thumbDown" onclick="thumb('down')" title="Flag this card">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>
        </button>
      </div>

      <div class="flag-panel" id="flagPanel" style="display:none">
        <label class="flag-label">What's wrong with this card?</label>
        <textarea id="flagNote" class="flag-textarea" placeholder="e.g. The answer seems incorrect, or the question is ambiguous…" rows="3"></textarea>
        <div class="flag-actions">
          <button class="flag-cancel" onclick="cancelFlag()">Cancel</button>
          <button class="flag-submit" onclick="submitFlag()">Submit flag</button>
        </div>
      </div>

      <p class="hint" id="hintText">Click the card to reveal the answer</p>
      <div class="controls">
        <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
        <span id="cardNum"></span>
        <button class="nav-btn" id="nextBtn" onclick="next()">Next →</button>
      </div>
      <div class="rating-row" id="ratingRow" style="display:none">
        <button class="rating-btn hard" onclick="rate('hard')">Hard</button>
        <button class="rating-btn ok"   onclick="rate('ok')">OK</button>
        <button class="rating-btn good" onclick="rate('good')">Got it</button>
      </div>
    </div>

    <div id="summary" style="display:none">
      <div class="summary">
        <h2>Deck complete</h2>
        <p>Here's how you did:</p>
        <div class="stat-grid">
          <div class="stat"><div class="stat-n" id="sGood">0</div><div class="stat-l">Got it</div></div>
          <div class="stat"><div class="stat-n" id="sOk">0</div><div class="stat-l">OK</div></div>
          <div class="stat"><div class="stat-n" id="sHard">0</div><div class="stat-l">Hard</div></div>
        </div>
        <div id="flagSummary" style="display:none">
          <p class="flag-summary-label">You flagged <span id="flagCount">0</span> card(s) for review.</p>
          <button class="export-btn" onclick="exportFlags()">Download flagged cards</button>
        </div>
        <div class="summary-actions">
          <button class="restart-btn" onclick="restart()">Study again</button>
          <button class="restart-btn" onclick="showFilterPicker()">Change filters</button>
          <button class="restart-btn" onclick="showPicker()">All decks</button>
        </div>
      </div>
    </div>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>
